<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT Attendance - Teacher Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        .login-box {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 16px;
            width: 380px;
            border: 1px solid #2a2a4a;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 24px;
            color: #00d4ff;
        }
        .logo p {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            outline: none;
        }
        input:focus {
            border-color: #00d4ff;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #00d4ff;
            color: #0f0f1a;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-btn:hover {
            background: #00b8d9;
        }
        .error {
            color: #ff4444;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <h1>📡 BT Attendance</h1>
            <p>Teacher Login</p>
        </div>
        <div class="form-group">
            <label>Teacher Name</label>
            <input type="text" id="username" placeholder="Enter your name" />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password" />
        </div>
        <button class="login-btn" onclick="login()">Login</button>
        <p class="error" id="error">Invalid credentials! Please try again.</p>
    </div>

    <script>
        const API_BASE = 'https://web-production-204c7.up.railway.app';

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerText = 'Please fill all fields!';
                return;
            }

            const res = await fetch(`${API_BASE}/teacher-login?username=${username}&password=${password}`, {
                method: 'POST'
            });
            const data = await res.json();

            if (data.success) {
                localStorage.setItem('teacher_id', data.teacher_id);
                localStorage.setItem('teacher_name', data.name);
                window.location.href = 'teacher_dashboard.html';
            } else {
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerText = data.message;
            }
        }
    </script>
</body>
</html>
